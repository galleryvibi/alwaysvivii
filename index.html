<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Vivii 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GAYA DASAR --- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fcf5f7;
            background-image: radial-gradient(#ffcad4 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; /* Mengunci agar background tidak bisa di-scroll */
        }

        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdf5f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #welcome-screen h1 {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            color: #d17a7e;
            margin-bottom: 25px;
        }

        .open-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #c04968;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- KOTAK ALBUM (STABIL) --- */
        .square-album {
            width: 95%;
            max-width: 800px;
            aspect-ratio: 1 / 0.6;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(220, 160, 170, 0.3);
            display: flex;
            overflow: hidden; 
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease, transform 1s ease;
            z-index: 10;
        }

        .square-album.show {
            opacity: 1;
            transform: scale(1);
        }

        .left-photo {
            width: 50%;
            height: 100%;
            background: #fdf5f6;
        }

        .left-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: opacity 0.8s ease-in-out;
        }

        .right-lyrics {
            width: 50%;
            height: 100%;
            padding: 45px 35px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            text-align: left;
        }

        .song-title {
            font-size: 1.8rem;
            color: #d17a7e;
            font-weight: 700;
            margin: 0;
        }

        .song-artist {
            font-size: 1rem;
            color: #b598a1;
            margin: 5px 0 25px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Kotak Scroll Lirik (Difiksasi untuk Chrome) */
        .lyrics-box {
            flex: 1;
            overflow-y: hidden; /* Kita gerakkan lewat JS, jadi scrollbar manual dimatikan */
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        .lyrics-content {
            position: absolute;
            width: 100%;
            transition: top 0.5s ease-in-out; /* Animasi geser lirik yang mulus */
            top: 0;
        }

        .lyric-line {
            font-size: 1.15rem;
            color: #d8c3c8; 
            margin-bottom: 20px;
            line-height: 1.5;
            transition: all 0.4s ease;
        }

        .lyric-line.active {
            color: #d17a7e; 
            font-weight: 700;
            font-size: 1.4rem;
            transform: scale(1.05); 
        }

        @media (max-width: 768px) {
            .square-album {
                flex-direction: column;
                aspect-ratio: auto;
                height: 85vh;
                max-width: 400px;
            }
            .left-photo { width: 100%; height: 40%; }
            .right-lyrics { width: 100%; height: 60%; padding: 25px; }
        }
    </style>
</head>
<body>

    <audio id="myAudio" src="sukavivi.mp3" loop></audio>

    <div id="welcome-screen">
        <h1>bima ada sesuatu buat vivii...</h1>
        <button class="open-btn" onclick="startAlbum()">bukaaa 💌</button>
    </div>

    <div class="square-album" id="album-container">
        <div class="left-photo">
            <img id="photo-display" alt="Foto Pacar">
        </div>

        <div class="right-lyrics">
            <h1 class="song-title">I'd like to watch you sleeping</h1>
            <p class="song-artist">Sal Priadi</p>
            
            <div class="lyrics-box">
                <div class="lyrics-content" id="lyrics-content"></div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const welcomeScreen = document.getElementById("welcome-screen");
        const albumContainer = document.getElementById("album-container");
        const lyricsContent = document.getElementById("lyrics-content");

        function startAlbum() {
            welcomeScreen.style.opacity = "0";
            setTimeout(() => {
                welcomeScreen.style.display = "none";
                albumContainer.classList.add("show");
                audio.play();
            }, 600);
        }

        const photos = ["vivi1.jpg", "vivi6.jpg", "vivi3.jpg", "vivi4~2.jpg"];
        const photoDisplay = document.getElementById("photo-display");
        let currentPhotoIndex = 0;
        photoDisplay.src = photos[currentPhotoIndex];

        setInterval(() => {
            photoDisplay.style.opacity = "0.3";
            setTimeout(() => {
                currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                photoDisplay.src = photos[currentPhotoIndex];
                photoDisplay.style.opacity = "1";
            }, 800);
        }, 4000);

        const lyricsData = [
            { time: 0, text: "Hal yang paling ku suka" },
            { time: 3, text: "Di dekatmu" },
            { time: 5, text: "Kau adalah orang" },
            { time: 6.5, text: "Favoritku..." },
            { time: 8.5, text: "Nomer satu" },
            { time: 9.6, text: "Nomer dua" },
            { time: 11.5, text: "Tiga" },
            { time: 12.5, text: "Empat" },
            { time: 13.5, text: "Lima" },
            { time: 14.5, text: "Enam" },
            { time: 15.5, text: "Isinya namamu" },
            { time: 18.4, text: "NOVIA EXTA ARIANA" }
        ];

        // Masukkan lirik
        lyricsData.forEach((lyric, index) => {
            let div = document.createElement("div");
            div.className = "lyric-line";
            div.id = "lyric-" + index;
            div.innerText = lyric.text;
            lyricsContent.appendChild(div);
        });

        let activeLyricIndex = -1;

        audio.addEventListener("timeupdate", () => {
            const currentTime = audio.currentTime;
            let newActiveIndex = -1;

            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) newActiveIndex = i;
                else break;
            }

            if (newActiveIndex !== activeLyricIndex && newActiveIndex !== -1) {
                // Matikan yang lama
                if (activeLyricIndex !== -1) {
                    document.getElementById("lyric-" + activeLyricIndex).classList.remove("active");
                }

                // Aktifkan yang baru
                activeLyricIndex = newActiveIndex;
                const activeElement = document.getElementById("lyric-" + activeLyricIndex);
                activeElement.classList.add("active");

                // --- PERBAIKAN UNTUK CHROME ---
                // Hitung posisi: Geser kontainer lirik agar baris yang aktif selalu di posisi atas/tengah box
                // Rumus: tinggi baris dikali urutan baris
                const moveAmount = activeElement.offsetTop - 40; 
                lyricsContent.style.top = `-${moveAmount}px`;
            }
        });
    </script>
</body>
</html>
