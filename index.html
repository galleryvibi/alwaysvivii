<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>untuk vivii</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d17a7e;
            --bg-soft: #fdf5f6;
            --white: #ffffff;
            --shadow: rgba(209, 122, 126, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-soft);
            background-image: radial-gradient(#ffcad4 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; 
        }

        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-soft);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        #welcome-screen h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .open-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #c04968;
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--shadow);
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px var(--shadow);
        }

        /* --- HEART ANIMATION --- */
        .heart {
            position: absolute;
            color: var(--primary);
            font-size: 20px;
            z-index: 1000;
            animation: moveHeart 3s linear forwards;
        }

        @keyframes moveHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* --- MAIN CARD --- */
        .spotify-card {
            width: 92%;
            max-width: 750px;
            height: 60vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            box-shadow: 0 30px 70px var(--shadow);
            display: flex;
            overflow: hidden; 
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .spotify-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- FOTO AREA (ZOOM DIHAPUS) --- */
        .cover-art {
            width: 40%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            position: absolute;
            opacity: 0;
            /* Efek transisi pudar tetap dipertahankan agar halus saat ganti foto */
            transition: opacity 1.5s ease-in-out;
            /* Transform scale dihapus agar foto statis */
        }

        .cover-art img.active {
            opacity: 1;
            /* Animasi kenburns dihapus */
        }

        /* --- LYRICS SECTION --- */
        .lyrics-section {
            width: 60%;
            height: 100%;
            padding: 35px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .song-info {
            margin-bottom: 20px;
            flex-shrink: 0;
            border-left: 3px solid var(--primary);
            padding-left: 15px;
        }

        .song-info h1 {
            font-size: 1.5rem;
            color: #333;
            margin: 0;
            line-height: 1.2;
        }

        .song-info p {
            font-size: 0.9rem;
            color: var(--primary);
            margin: 5px 0 0 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lyrics-viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        .lyric-item {
            position: absolute;
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 700;
            line-height: 1.3;
            width: 100%;
            opacity: 0;
            filter: blur(8px);
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lyric-item.active {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .spotify-card {
                flex-direction: column;
                height: 80vh;
                width: 85%;
            }
            .cover-art { width: 100%; height: 45%; }
            .lyrics-section { width: 100%; height: 55%; padding: 25px; }
            .song-info { margin-bottom: 15px; }
            .song-info h1 { font-size: 1.2rem; }
            .lyric-item { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <audio id="mainAudio" src="sukavivi.mp3" loop></audio>

    <div id="welcome-screen">
        <h1>bima ada sesuatu <br> buat vivii.../h1>
        <button class="open-btn" onclick="initExperience()">BUKA SEKARANG</button>
    </div>

    <div class="spotify-card" id="card">
        <div class="cover-art" id="photo-container"></div>

        <div class="lyrics-section">
            <div class="song-info">
                <h1>I'd like to watch <br> you sleeping</h1>
                <p>Sal Priadi</p>
            </div>
            
            <div class="lyrics-viewport" id="viewport"></div>
        </div>
    </div>

    <script>
        const audio = document.getElementById("mainAudio");
        const viewport = document.getElementById("viewport");
        const photoContainer = document.getElementById("photo-container");

        // Ganti dengan nama file foto kamu yang sebenarnya
        const photos = ["vivi1.jpg", "vivi6.jpg", "vivi3.jpg", "vivi4~2.jpg"];
        const lyricsData = [
            { t: 0, text: "Hal yang paling ku suka" },
            { t: 3, text: "Di dekatmu" },
            { t: 5, text: "Kau adalah orang" },
            { t: 6.5, text: "Favoritku..." },
            { t: 8.5, text: "Nomer satu" },
            { t: 9.6, text: "Nomer dua" },
            { t: 11.5, text: "Tiga" },
            { t: 12.5, text: "Empat" },
            { t: 13.5, text: "Lima" },
            { t: 14.5, text: "Enam" },
            { t: 15.5, text: "Isinya namamu" },
            { t: 18.4, text: "NOVIA EXTA ARIANA ❤️" }
        ];

        // Init Photos
        photos.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src;
            if(i === 0) img.classList.add("active");
            img.id = `vivi-img-${i}`;
            photoContainer.appendChild(img);
        });

        // Init Lyrics
        lyricsData.forEach((item, i) => {
            const el = document.createElement("div");
            el.className = "lyric-item";
            el.id = "line-" + i;
            el.innerText = item.text;
            viewport.appendChild(el);
        });

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";
            heart.style.animationDuration = Math.random() * 2 + 2 + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function initExperience() {
            for(let i=0; i<25; i++) {
                setTimeout(createHeart, i * 150);
            }
            document.getElementById("welcome-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("welcome-screen").style.display = "none";
                document.getElementById("card").classList.add("show");
                audio.play();
            }, 800);
        }

        // Slideshow Logic (Hanya ganti foto, tanpa zoom)
        let photoIndex = 0;
        setInterval(() => {
            document.getElementById(`vivi-img-${photoIndex}`).classList.remove("active");
            photoIndex = (photoIndex + 1) % photos.length;
            document.getElementById(`vivi-img-${photoIndex}`).classList.add("active");
        }, 5000); // Ganti foto setiap 5 detik

        // Lyrics Logic
        let lastIndex = -1;
        audio.addEventListener("timeupdate", () => {
            const time = audio.currentTime;
            let activeIndex = -1;

            for (let i = 0; i < lyricsData.length; i++) {
                if (time >= lyricsData[i].t) activeIndex = i;
                else break;
            }

            if (activeIndex !== lastIndex && activeIndex !== -1) {
                if (lastIndex !== -1) {
                    document.getElementById("line-" + lastIndex).classList.remove("active");
                }
                lastIndex = activeIndex;
                document.getElementById("line-" + activeIndex).classList.add("active");
            }
        });
    </script>
</body>
</html>
